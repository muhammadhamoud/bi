{% extends 'layouts/auth.html' %}
{% block title %}Signed out · {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-lg rounded-3xl border border-slate-200 bg-white p-8 text-center shadow-panel dark:border-slate-800 dark:bg-slate-900">
  <h1 class="text-2xl font-semibold">You have signed out</h1>
  <p class="mt-3 text-slate-500 dark:text-slate-400">Your session ended successfully.</p>
  <a href="{% url 'login' %}" class="mt-6 inline-flex rounded-2xl bg-blue-600 px-5 py-3 font-semibold text-white hover:bg-blue-700">Sign in again</a>
</div>
{% endblock %}
