{% if available_properties %}
    {% if available_properties|length > 1 %}
        <div
            x-data="{ showPropertyForm: false, closeTimer: null }"
            @mouseenter="clearTimeout(closeTimer); showPropertyForm = true"
            @mouseleave="closeTimer = setTimeout(() => showPropertyForm = false, 120)"
            class="relative hidden md:block"
        >
            <button
                type="button"
                class="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-white text-slate-700 shadow-soft transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800"
                title="Select property"
            >
                <i class="fas fa-building"></i>
            </button>

            <div
                x-show="showPropertyForm"
                x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 translate-y-2 scale-95"
                x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                x-transition:leave="transition ease-in duration-150"
                x-transition:leave-start="opacity-100 translate-y-0 scale-100"
                x-transition:leave-end="opacity-0 translate-y-2 scale-95"
                x-cloak
                class="absolute right-0 z-50 mt-3"
            >
                <div class="rounded-2xl border border-slate-200 bg-white p-3 shadow-lg dark:border-slate-700 dark:bg-slate-900">
                    <form method="post" action="{% url 'properties:switch' %}">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="{{ request.get_full_path }}">
                        <select
                            name="property_id"
                            onchange="this.form.submit()"
                            class="min-w-[240px] rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-900"
                        >
                            {% for property in available_properties %}
                                <option value="{{ property.id }}" {% if current_property and property.id == current_property.id %}selected{% endif %}>
                                    {{ property.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </form>
                </div>
            </div>
        </div>
    {% else %}
        <div class="relative hidden md:block">
            <div
                class="inline-flex h-11 items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 shadow-soft dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200"
                title="{{ available_properties.0.name }}"
            >
                <i class="fas fa-building text-sm"></i>
                <span class="max-w-[180px] truncate">{{ available_properties.0.name }}</span>
            </div>
        </div>
    {% endif %}
{% endif %}
