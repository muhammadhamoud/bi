<a
    href="{% url 'announcements:list' %}"
    class="relative inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-white text-slate-700 shadow-sm transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800"
    aria-label="Announcements"
    title="Announcements"
>
    <i class="fas fa-bullhorn text-base"></i>

    {% if active_announcements_count %}
        <span class="absolute -right-1 -top-1 inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-amber-500 px-1 text-[10px] font-semibold text-white">
            {{ active_announcements_count }}
        </span>
    {% endif %}
</a>
