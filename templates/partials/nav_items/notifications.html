<div
    x-data="{ open: false, closeTimer: null }"
    @mouseenter="clearTimeout(closeTimer); open = true"
    @mouseleave="closeTimer = setTimeout(() => open = false, 120)"
    @click.outside="open = false"
    class="group relative"
>
    <a
        href="{% url 'notifications:list' %}"
        class="relative inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-white text-slate-700 shadow-sm transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800"
        aria-label="Notifications"
        title="Notifications"
    >
        <i class="fas fa-bell text-base"></i>

        {% if unread_notifications_count %}
            <span class="absolute -right-1 -top-1 inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-blue-600 px-1 text-[10px] font-semibold text-white">
                {{ unread_notifications_count }}
            </span>
        {% endif %}
    </a>

    <div
        x-show="open"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 translate-y-2 scale-95"
        x-transition:enter-end="opacity-100 translate-y-0 scale-100"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 translate-y-0 scale-100"
        x-transition:leave-end="opacity-0 translate-y-2 scale-95"
        x-cloak
        class="absolute right-0 top-12 z-50 w-96 rounded-2xl border border-slate-200 bg-white p-4 shadow-panel dark:border-slate-700 dark:bg-slate-900"
    >
        <div class="mb-3 flex items-center justify-between">
            <p class="font-semibold text-slate-900 dark:text-white">Notifications</p>
            <a
                href="{% url 'notifications:list' %}"
                class="text-sm font-medium text-brand-600 hover:text-brand-700 dark:text-brand-400 dark:hover:text-brand-300"
            >
                View all
            </a>
        </div>

        <div class="space-y-2">
            {% for item in latest_notifications %}
                <a
                    href="{% url 'notifications:list' %}"
                    class="block rounded-xl border border-slate-200 px-3 py-2 text-sm transition hover:bg-slate-50 dark:border-slate-800 dark:hover:bg-slate-950"
                >
                    <p class="font-medium text-slate-900 dark:text-white">{{ item.title }}</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400">
                        {{ item.message|truncatechars:100 }}
                    </p>
                </a>
            {% empty %}
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    No notifications right now.
                </p>
            {% endfor %}
        </div>
    </div>
</div>
