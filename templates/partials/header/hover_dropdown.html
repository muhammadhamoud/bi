<div
    x-data="{ open: false, activeGroup: null, closeTimer: null }"
    @mouseenter="clearTimeout(closeTimer); open = true"
    @mouseleave="closeTimer = setTimeout(() => { open = false; activeGroup = null }, 120)"
    class="relative hidden lg:block"
>
    <button
        type="button"
        class="{{ item.trigger_classes }}"
    >
        {% if item.icon %}
            <i class="{{ item.icon }}"></i>
        {% endif %}
        <span>{{ item.label }}</span>
        <i class="fas fa-chevron-down text-xs transition duration-200"
           :class="open ? 'rotate-180' : ''"></i>
    </button>

    {% if item.items_var == "report_menu" %}
        <div
            x-show="open"
            x-transition
            x-cloak
            class="absolute left-0 z-50 mt-3 flex rounded-2xl border border-slate-200 bg-white shadow-panel dark:border-slate-700 dark:bg-slate-900"
        >
            <div class="w-72 border-r border-slate-200 p-2 dark:border-slate-700">
                {% for group in report_menu %}
                    <button
                        type="button"
                        @mouseenter="activeGroup = '{{ forloop.counter }}'"
                        class="flex w-full items-center justify-between rounded-xl px-3 py-3 text-left text-sm text-slate-700 transition hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800"
                        :class="activeGroup === '{{ forloop.counter }}' ? 'bg-slate-100 dark:bg-slate-800' : ''"
                    >
                        <span class="flex items-center gap-3">
                            <i class="fas {{ group.icon }} w-4 text-center text-{{ group.color }}-600 dark:text-{{ group.color }}-400"></i>
                            <span class="font-medium">{{ group.title }}</span>
                        </span>
                        <i class="fas fa-chevron-right text-xs text-slate-400"></i>
                    </button>
                {% endfor %}
            </div>

            <div class="w-96 p-2">
                {% for group in report_menu %}
                    <div
                        x-show="activeGroup === '{{ forloop.counter }}'"
                        x-transition
                        x-cloak
                        class="space-y-1"
                    >
                        {% for subitem in group.items %}
                            <a
                                href="{{ subitem.url }}"
                                class="flex items-center gap-3 rounded-xl px-3 py-3 text-sm text-slate-700 transition hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800"
                            >
                                <i class="fas {{ subitem.icon }} w-4 text-center text-{{ group.color }}-500 dark:text-{{ group.color }}-400"></i>
                                <div class="min-w-0">
                                    <p class="font-medium">{{ subitem.title }}</p>
                                </div>
                            </a>
                        {% endfor %}
                    </div>
                {% endfor %}

                <div
                    x-show="activeGroup === null"
                    class="flex h-full min-h-[240px] items-center justify-center px-6 text-center text-sm text-slate-400 dark:text-slate-500"
                >
                    Hover over a group to view reports
                </div>
            </div>
        </div>
    {% endif %}
</div>
