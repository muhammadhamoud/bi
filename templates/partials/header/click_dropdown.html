<div x-data="{ open: false }" class="relative">
    <button
        type="button"
        @click="open = !open"
        @click.outside="open = false"
        class="{{ item.trigger_classes|default:'inline-flex items-center gap-2 rounded-xl px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100 hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white' }}"
    >
        {% if item.icon %}
            <i class="{{ item.icon }}"></i>
        {% endif %}
        <span>{{ item.label }}</span>
        <i class="fas fa-chevron-down text-xs transition duration-200"
           :class="open ? 'rotate-180' : ''"></i>
    </button>

    <div
        x-show="open"
        x-transition
        x-cloak
        class="absolute right-0 z-50 mt-3 w-64 rounded-2xl border border-slate-200 bg-white p-2 shadow-panel dark:border-slate-700 dark:bg-slate-900"
    >
        <div class="px-3 py-2 text-sm text-slate-500 dark:text-slate-400">
            Add your dropdown items here.
        </div>
    </div>
</div>
