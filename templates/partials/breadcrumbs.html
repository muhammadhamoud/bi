{% if breadcrumbs %}
  <nav class="mb-6 flex flex-wrap items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
    {% for label, url in breadcrumbs %}
      {% if not forloop.first %}
        <span class="text-slate-400 dark:text-slate-500">
          <i class="fas fa-chevron-right text-[10px]"></i>
        </span>
      {% endif %}

      {% if forloop.first %}
        {% if url %}
          <a
            href="{{ url }}"
            class="inline-flex items-center rounded-lg p-1.5 text-slate-500 transition hover:bg-slate-100 hover:text-blue-600 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-blue-400"
            aria-label="Home"
            title="Home"
          >
            <i class="fas fa-home text-sm"></i>
          </a>
        {% else %}
          <span
            class="inline-flex items-center rounded-lg p-1.5 text-slate-800 dark:text-slate-100"
            aria-label="Home"
            title="Home"
          >
            <i class="fas fa-home text-sm"></i>
          </span>
        {% endif %}
      {% else %}
        {% if url %}
          <a
            href="{{ url }}"
            class="font-medium text-slate-500 transition hover:text-blue-600 dark:text-slate-400 dark:hover:text-blue-400"
          >
            {{ label }}
          </a>
        {% else %}
          <span class="font-semibold text-slate-800 dark:text-slate-100">
            {{ label }}
          </span>
        {% endif %}
      {% endif %}
    {% endfor %}
  </nav>
{% endif %}
