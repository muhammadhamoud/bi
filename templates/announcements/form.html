{% extends 'layouts/dashboard.html' %}
{% block title %}{{ page_title }} · {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-4xl rounded-3xl border border-slate-200 bg-white p-8 shadow-soft dark:border-slate-800 dark:bg-slate-900">
  <h1 class="text-2xl font-semibold">{{ page_title }}</h1>
  <form method="post" class="mt-6 grid gap-4 md:grid-cols-2">{% csrf_token %}{% for field in form %}<div class="{% if field.name == 'body' or field.name == 'properties' or field.name == 'target_roles' %}md:col-span-2{% endif %}"><label class="mb-1 block text-sm font-medium">{{ field.label }}</label>{{ field }}{% for error in field.errors %}<p class="mt-1 text-xs text-rose-600">{{ error }}</p>{% endfor %}</div>{% endfor %}<div class="md:col-span-2 flex gap-3">
    <button class="rounded-xl bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-700">Save</button>
    <a href="{% url 'announcements:list' %}" class="rounded-xl border border-slate-300 px-4 py-2.5 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800">Cancel</a>
  </div></form>
</div>
{% endblock %}
