<div
    id="{{ dialog_id|default:'filter-dialog' }}"
    class="fixed inset-0 z-50 hidden"
    aria-labelledby="{{ dialog_id|default:'filter-dialog' }}-title"
    aria-modal="true"
    role="dialog"
>
    <div
        class="absolute inset-0 bg-black/50"
        id="{{ dialog_id|default:'filter-dialog' }}-backdrop"
    ></div>

    <div class="flex min-h-full items-start justify-center pt-6 px-4">
        <div class="relative w-full {{ dialog_width|default:'max-w-3xl' }} rounded-3xl border border-slate-200 bg-white shadow-xl dark:border-slate-800 dark:bg-slate-900">
            <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4 dark:border-slate-800">
                <div>
                    <h2
                        id="{{ dialog_id|default:'filter-dialog' }}-title"
                        class="text-lg font-semibold text-slate-900 dark:text-slate-100"
                    >
                        {{ dialog_title|default:'Filter records' }}
                    </h2>
                    <p class="text-sm text-slate-500 dark:text-slate-400">
                        {{ dialog_description|default:'Apply filters to narrow down the list.' }}
                    </p>
                </div>

                <button
                    type="button"
                    id="{{ dialog_id|default:'filter-dialog' }}-close"
                    class="rounded-2xl px-3 py-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-slate-200"
                >
                    Close
                </button>
            </div>

            <form method="get" class="p-6">
                <div class="grid gap-4 {{ dialog_grid_classes|default:'md:grid-cols-2 xl:grid-cols-3' }}">
                    {% for field in filter_form %}
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200">
                                {{ field.label }}
                            </label>
                            {{ field }}
                        </div>
                    {% endfor %}
                </div>

                <div class="mt-6 flex flex-wrap gap-3">
                    <button
                        type="submit"
                        class="rounded-xl bg-slate-900 px-3.5 py-2 font-semibold text-white hover:bg-slate-800 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-slate-200"
                    >
                        Apply Filters
                    </button>

                    <a
                        href="{{ request.path }}"
                        class="rounded-2xl border border-slate-300 px-3.5 py-2 font-semibold text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800"
                    >
                        Reset
                    </a>

                    <button
                        type="button"
                        id="{{ dialog_id|default:'filter-dialog' }}-close-footer"
                        class="rounded-xl border border-slate-300 px-3.5 py-2 font-semibold text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800"
                    >
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
