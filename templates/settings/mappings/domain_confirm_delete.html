{% extends 'layouts/dashboard.html' %}

{% block title %}{{ page_title }} · {{ APP_NAME }}{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl rounded-3xl border border-slate-200 bg-white p-8 shadow-sm dark:border-slate-800 dark:bg-slate-900">
    <h1 class="text-2xl font-semibold">{{ page_title }}</h1>

    <div class="mt-4 rounded-2xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-800 dark:border-rose-900 dark:bg-rose-950/30 dark:text-rose-300">
        You are about to delete this record.
    </div>

    <div class="mt-6 rounded-2xl border border-slate-200 p-4 dark:border-slate-800">
        <div class="text-sm text-slate-500">Code</div>
        <div class="font-semibold">{{ object.code }}</div>

        <div class="mt-3 text-sm text-slate-500">Name</div>
        <div class="font-semibold">{{ object.name }}</div>
    </div>

    <form method="post" class="mt-6 flex flex-wrap gap-3">
        {% csrf_token %}

        <button type="submit"
                class="rounded-xl bg-rose-600 px-4 py-2 font-semibold text-white hover:bg-rose-700">
            Confirm delete
        </button>

        <a href="{{ root_list_url }}"
           class="rounded-xl border border-slate-300 px-4 py-2">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
