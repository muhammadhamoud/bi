<td class="px-2 py-1 align-middle">
    {% if can_manage %}
        <div
            x-data="{
                editing: false,
                hovering: false,
                label: '{{ display_value|default:"—"|escapejs }}'
            }"
            class="w-full"
        >
            <button
                type="button"
                x-show="!editing"
                @click="$nextTick(() => { editing = true; $refs.input.focus() })"
                @mouseenter="hovering = true"
                @mouseleave="hovering = false"
                class="flex w-full items-center justify-between gap-2 rounded-lg px-2 py-0.5 text-left hover:bg-slate-100 dark:hover:bg-slate-800"
            >
                <span class="min-w-0 flex-1 truncate">
                    <span
                        class="inline-flex items-center gap-1.5 rounded-full px-2 py-0.5 text-xs font-medium"
                        :class="label === '—'
                            ? 'border border-red-200 bg-red-50 text-red-700 dark:border-red-500/20 dark:bg-red-500/10 dark:text-red-400'
                            : 'border border-blue-200 bg-blue-50 text-blue-700 dark:border-blue-500/20 dark:bg-blue-500/10 dark:text-blue-400'"
                    >
                        <i
                            class="fas text-[10px]"
                            :class="label === '—' ? 'fa-circle-exclamation' : 'fa-pen'"
                            aria-hidden="true"
                        ></i>
                        <span x-text="label"></span>
                    </span>
                </span>

                <i
                    x-show="hovering"
                    x-cloak
                    class="fas fa-chevron-down text-[10px] text-slate-400"
                    aria-hidden="true"
                ></i>
            </button>

            <div x-show="editing" x-cloak class="w-full">
                <select
                    x-ref="input"
                    name="{{ field_name }}"
                    class="w-full rounded-lg border border-slate-300 px-2 py-0.5 text-sm dark:border-slate-700 dark:bg-slate-900"
                    hx-post="{% url post_url_name domain=domain_key pk=object.pk %}"
                    hx-trigger="change"
                    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                    hx-target="closest td"
                    hx-swap="outerHTML"
                    @change="
                        label = $event.target.options[$event.target.selectedIndex].text;
                        editing = false;
                    "
                    @blur="editing = false"
                >
                    <option value="">—</option>
                    {% for option in options %}
                        <option value="{{ option.pk }}" {% if current_related_id == option.pk %}selected{% endif %}>
                            {{ option.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>
        </div>
    {% else %}
        <div class="w-full px-2 py-0.5">
            <span
                class="inline-flex items-center gap-1.5 rounded-full px-2 py-0.5 text-xs font-medium
                {% if display_value and display_value != '—' %}
                    border border-slate-200 bg-slate-50 text-slate-700 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200
                {% else %}
                    border border-red-200 bg-red-50 text-red-700 dark:border-red-500/20 dark:bg-red-500/10 dark:text-red-400
                {% endif %}"
            >
                <i
                    class="fas text-[10px] {% if display_value and display_value != '—' %}fa-link{% else %}fa-circle-exclamation{% endif %}"
                    aria-hidden="true"
                ></i>
                {{ display_value|default:'—' }}
            </span>
        </div>
    {% endif %}
</td>
