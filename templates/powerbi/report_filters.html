{# templates/powerbi/report_filters.html #}
<div
    {% if mode == 'dropdown' %}
        x-data="{ searchOpen: false }"
        @click.outside="searchOpen = false"
        class="relative"
    {% else %}
        class="relative w-full"
    {% endif %}
>
    {% if mode == 'dropdown' %}
        <button
            type="button"
            @click="searchOpen = !searchOpen"
            class="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-white/70 text-slate-700 shadow-soft transition hover:bg-white dark:border-white/10 dark:bg-white/5 dark:text-slate-200 dark:hover:bg-white/10"
            aria-label="Search reports"
            :aria-expanded="searchOpen"
        >
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m1.6-5.15a6.75 6.75 0 1 1-13.5 0 6.75 6.75 0 0 1 13.5 0Z"/>
            </svg>
        </button>
    {% endif %}

    <div
        {% if mode == 'dropdown' %}
            x-show="searchOpen"
            x-transition.origin.top.right
            x-cloak
            class="absolute right-0 top-full z-50 mt-2 w-[24rem]"
        {% else %}
            class="w-full"
        {% endif %}
    >
        <div
            x-data="reportAutocomplete('{{ input_id }}', '{% url 'powerbi:report-autocomplete' %}')"
            {% if mode == 'dropdown' %}
                x-init="$watch('$root.searchOpen', value => { if (value) $nextTick(() => $refs.searchInput.focus()) })"
            {% endif %}
            class="relative"
        >
            <form
                @submit.prevent
                class="rounded-2xl border border-slate-200 bg-white shadow-panel dark:border-slate-700 dark:bg-slate-900"
            >
                <div class="flex items-center gap-3 rounded-2xl px-4 py-3">
                    <svg class="h-4 w-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m1.6-5.15a6.75 6.75 0 1 1-13.5 0 6.75 6.75 0 0 1 13.5 0Z"/>
                    </svg>

                    <input
                        x-ref="searchInput"
                        :id="inputId"
                        type="text"
                        x-model="query"
                        @input.debounce.300ms="searchReports()"
                        @focus="if(results.length) open = true"
                        @keydown.escape="open = false"
                        placeholder="Search reports..."
                        class="w-full bg-transparent text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none dark:text-white dark:placeholder:text-slate-500"
                        autocomplete="off"
                    >

                    <button
                        x-show="query.length"
                        x-cloak
                        type="button"
                        @click="clearSearch()"
                        class="text-xs text-slate-400 transition hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300"
                    >
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </form>

            <div
                x-show="open"
                x-transition
                x-cloak
                class="absolute left-0 right-0 top-full z-[60] mt-2 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-2xl dark:border-slate-700 dark:bg-slate-900"
            >
                <div x-show="loading" class="px-4 py-3 text-sm text-slate-500 dark:text-slate-400">
                    Searching reports...
                </div>

                <template x-if="!loading && query.length >= 2 && results.length === 0">
                    <div class="px-4 py-3 text-sm text-slate-500 dark:text-slate-400">
                        No reports found.
                    </div>
                </template>

                <div x-show="results.length > 0" class="max-h-80 overflow-y-auto p-2">
                    <template x-for="report in results" :key="report.url">
                        <a
                            :href="report.url"
                            @click="open = false"
                            class="flex items-start gap-3 rounded-xl px-3 py-3 text-sm text-slate-700 transition hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800"
                        >
                            <i class="fas fa-file-lines mt-0.5 w-4 text-center text-sky-500 dark:text-sky-400"></i>
                            <div class="min-w-0">
                                <p class="truncate font-medium" x-text="report.name"></p>
                                <p
                                    x-show="report.group"
                                    class="truncate text-xs text-slate-500 dark:text-slate-400"
                                    x-text="report.group"
                                ></p>
                            </div>
                        </a>
                    </template>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function reportAutocomplete(inputId, url) {
        return {
            inputId: inputId,
            endpoint: url,
            query: '',
            results: [],
            open: false,
            loading: false,

            async searchReports() {
                const q = this.query.trim();

                if (q.length < 2) {
                    this.results = [];
                    this.open = false;
                    return;
                }

                this.loading = true;
                this.open = true;

                try {
                    const response = await fetch(`${this.endpoint}?q=${encodeURIComponent(q)}`, {
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    });

                    if (!response.ok) {
                        throw new Error('Request failed');
                    }

                    const data = await response.json();
                    this.results = data.results || [];
                } catch (error) {
                    this.results = [];
                } finally {
                    this.loading = false;
                    this.open = true;
                }
            },

            clearSearch() {
                this.query = '';
                this.results = [];
                this.open = false;
                this.$nextTick(() => this.$refs.searchInput.focus());
            }
        }
    }
</script>
