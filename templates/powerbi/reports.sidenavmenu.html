{% if report_menu %}
<div
  x-data="{
    open: {% if request.resolver_match.namespace == 'powerbi' and show_report_group_children|default:False %}true{% else %}false{% endif %}
  }"
  class="space-y-1"
>
  <div class="flex items-center gap-2">
    <a
      href="{% url 'powerbi:group-list' %}"
      class="sidebar-link flex min-w-0 flex-1 items-center justify-between rounded-2xl px-3 py-2 transition {% if request.resolver_match.namespace == 'powerbi' and request.resolver_match.url_name == 'group-list' %}bg-blue-600 text-white shadow-sm{% else %}text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-900{% endif %}"
    >
      <span class="sidebar-link-inner flex items-center gap-3">
        <span class="flex h-9 w-9 items-center justify-center rounded-xl {% if request.resolver_match.namespace == 'powerbi' and request.resolver_match.url_name == 'group-list' %}bg-white/10 text-white{% else %}bg-sky-100 text-sky-700 dark:bg-sky-500/10 dark:text-sky-400{% endif %}">
          <i class="fas fa-layer-group h-4 w-4 text-center"></i>
        </span>
        <span class="sidebar-label">Report Groups</span>
      </span>

      {% if not show_report_group_children|default:False %}
        <svg
          class="sidebar-chevron h-4 w-4 {% if request.resolver_match.namespace == 'powerbi' and request.resolver_match.url_name == 'group-list' %}text-white/80{% else %}text-slate-400{% endif %}"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          stroke-width="1.8"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      {% endif %}
    </a>

    {% if show_report_group_children|default:False %}
      <button
        type="button"
        @click="open = !open"
        class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl border border-slate-200 bg-white text-slate-500 transition hover:bg-slate-100 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800"
      >
        <svg
          class="h-4 w-4 transition-transform duration-200"
          :class="open ? 'rotate-90' : ''"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          stroke-width="1.8"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </button>
    {% endif %}
  </div>

  {% if show_report_group_children|default:False %}
    <div
      x-show="open"
      x-collapse
      x-cloak
      class="ml-4 space-y-1 border-l border-slate-200 pl-3 dark:border-slate-800"
    >
      {% for group in report_menu %}
        <a
          href="{{ group.url }}"
          class="sidebar-link flex items-center justify-between rounded-2xl px-3 py-2 transition {% if request.path == group.url %}bg-blue-600 text-white shadow-sm{% else %}text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-900{% endif %}"
        >
          <span class="sidebar-link-inner flex items-center gap-3">
            <span class="flex h-8 w-8 items-center justify-center rounded-xl {% if request.path == group.url %}bg-white/10 text-white{% else %}{{ group.group_icon_class|default:'bg-sky-100 text-sky-700 dark:bg-sky-500/10 dark:text-sky-400' }}{% endif %}">
              <i class="fas {{ group.icon }} h-4 w-4 text-center"></i>
            </span>
            <span class="sidebar-label">{{ group.title }}</span>
          </span>

          <svg
            class="sidebar-chevron h-4 w-4 {% if request.path == group.url %}text-white/80{% else %}text-slate-400{% endif %}"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            stroke-width="1.8"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </a>
      {% endfor %}
    </div>
  {% endif %}
</div>
{% endif %}
