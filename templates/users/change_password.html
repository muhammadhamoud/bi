{% extends 'layouts/dashboard.html' %}
{% block title %}Change Password · {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-xl rounded-3xl border border-slate-200 bg-white p-8 shadow-soft dark:border-slate-800 dark:bg-slate-900">
  <h1 class="text-2xl font-semibold">Change password</h1>
  <form method="post" class="mt-6 space-y-4">{% csrf_token %}{% for field in form %}<div><label class="mb-1 block text-sm font-medium">{{ field.label }}</label>{{ field }}{% for error in field.errors %}<p class="mt-1 text-xs text-rose-600">{{ error }}</p>{% endfor %}</div>{% endfor %}<button class="rounded-2xl bg-blue-600 px-5 py-3 font-semibold text-white hover:bg-blue-700">Update password</button></form>
</div>
{% endblock %}
