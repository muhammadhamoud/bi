{% extends 'layouts/dashboard.html' %}
{% block title %}{{ page_title }} · {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-4xl rounded-3xl border border-slate-200 bg-white p-8 shadow-soft dark:border-slate-800 dark:bg-slate-900">
  <h1 class="text-2xl font-semibold">{{ page_title }}</h1>
  <form method="post" class="mt-6 grid gap-4 md:grid-cols-2">
    {% csrf_token %}
    {% for field in form %}
      <div class="{% if field.name == 'properties' %}md:col-span-2{% endif %}">
        <label class="mb-1 block text-sm font-medium">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}<p class="mt-1 text-xs text-rose-600">{{ error }}</p>{% endfor %}
      </div>
    {% endfor %}
    <div class="md:col-span-2 flex gap-3 pt-4">
      <button class="rounded-2xl bg-brand-600 px-5 py-3 font-semibold text-white hover:bg-brand-700">Save</button>
      <a href="{% url 'users:list' %}" class="rounded-2xl border border-slate-300 px-5 py-3">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
