<div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
  <div class="mb-4 flex items-center justify-between">
    <div>
      <p class="text-sm text-slate-500 dark:text-slate-400">{{ card.title }}</p>
      <p class="mt-2 text-2xl font-semibold">{{ card.value }}</p>
    </div>
    <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-300">{{ card.icon }}</div>
  </div>
  <div class="flex items-center justify-between text-sm">
    <span class="rounded-full px-2 py-1 {% if card.trend == 'positive' %}bg-emerald-50 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300{% elif card.trend == 'negative' %}bg-rose-50 text-rose-700 dark:bg-rose-950 dark:text-rose-300{% else %}bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-300{% endif %}">
      {{ card.delta|floatformat:1 }}
    </span>
    <span class="text-slate-500 dark:text-slate-400">{{ card.subtitle }}</span>
  </div>
</div>
