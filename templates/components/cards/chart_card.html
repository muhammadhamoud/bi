<div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-soft dark:border-slate-800 dark:bg-slate-900">
  <div class="mb-4 flex items-center justify-between">
    <div>
      <h3 class="text-lg font-semibold">{{ title }}</h3>
      {% if description %}<p class="text-sm text-slate-500 dark:text-slate-400">{{ description }}</p>{% endif %}
    </div>
  </div>
  <div class="relative h-80">
    <canvas id="{{ canvas_id }}"></canvas>
  </div>
  {{ chart_config|json_script:script_id }}
</div>
<script>document.addEventListener('DOMContentLoaded', function(){ if(window.HorizonBI){ window.HorizonBI.renderChartFromScript('{{ canvas_id }}', '{{ script_id }}'); } });</script>
